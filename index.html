<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#eeedf5;color:#1a1a1a;font-size:13px;margin:0;padding:0}
:root{
  --purple:#6C63E8;--purple-dark:#5a52d0;
  --yellow:#F5C842;--yellow-text:#7a5e00;
  --green:#4DC9A0;--green-text:#0a5c3e;
  --violet:#A78BFA;--violet-text:#5b21b6;
  --blue:#60A5FA;--blue-text:#1e40af;
  --coral:#FB7185;
  --border:#e5e3dc;--row-odd:#fff;--row-even:#f7f6f2;
  --sec1:#6C63E8;--sec2:#5a52d0;--sec3:#4e46ba;--sec4:#433ca6;
}
#app{display:flex;flex-direction:column;height:100vh}

/* TOPBAR */
.topbar{
  background:linear-gradient(135deg,#1a1a3e 0%,#2d2a6e 40%,#1e3a5f 100%);
  border-bottom:none;
  padding:8px 16px;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;flex-shrink:0;flex-wrap:wrap;
  box-shadow:0 3px 16px rgba(30,30,100,.25);
  position:relative;overflow:hidden;
}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,#3b82f6,#6C63E8,#4DC9A0,#6C63E8,#3b82f6);
  background-size:200% 100%;animation:shimmer 4s linear infinite;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.topbar-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.updated-tag{font-size:9px;color:rgba(255,255,255,.4);background:rgba(255,255,255,.08);
  padding:2px 8px;border-radius:20px;white-space:nowrap;border:1px solid rgba(255,255,255,.1)}
.legend{display:flex;gap:5px}
.leg{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;
  box-shadow:0 1px 4px rgba(0,0,0,.15)}
.leg-event{background:var(--yellow);color:var(--yellow-text)}
.leg-post{background:var(--green);color:var(--green-text)}
.leg-video{background:var(--violet);color:var(--violet-text)}

.topbar-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.save-indicator{font-size:9px;color:rgba(255,255,255,.4);display:flex;align-items:center;gap:4px}
.save-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.2);transition:background .3s}
.save-dot.saving{background:var(--yellow);animation:blink 1s infinite}
.save-dot.saved{background:var(--green)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.mode-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.badge-admin{background:rgba(108,99,232,.3);color:#c4c0ff;border:1px solid rgba(108,99,232,.4)}
.badge-ro{background:rgba(77,201,160,.15);color:#7ff0cc;border:1px solid rgba(77,201,160,.3)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:7px;font-size:11px;font-weight:500;cursor:pointer;
  border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.1);color:rgba(255,255,255,.85);
  transition:all .15s;font-family:inherit;backdrop-filter:blur(4px)}
.btn:hover{background:rgba(255,255,255,.2);color:#fff}
.btn-primary{background:linear-gradient(135deg,#6C63E8,#4e46ba);color:#fff;border-color:rgba(108,99,232,.6);
  box-shadow:0 2px 8px rgba(108,99,232,.35)}
.btn-primary:hover{background:linear-gradient(135deg,#7c74f0,#5a52d0);box-shadow:0 4px 12px rgba(108,99,232,.45)}
.btn-danger{background:rgba(220,38,38,.15);color:#fca5a5;border-color:rgba(220,38,38,.3)}
.btn-danger:hover{background:rgba(220,38,38,.25)}
.btn-archive{background:rgba(3,105,161,.2);color:#7dd3fc;border-color:rgba(3,105,161,.35)}
.btn-archive:hover{background:rgba(3,105,161,.3)}
.btn-archive.active{background:rgba(3,105,161,.5);color:#fff;border-color:rgba(3,105,161,.6)}
.btn-admin{background:rgba(108,99,232,.3);color:#c4c0ff;border-color:rgba(108,99,232,.5);font-weight:600}

/* CALENDAR WRAP — fills remaining height, scrolls */
.cal-wrap{flex:1;overflow:auto}
.cal-table{border-collapse:separate;border-spacing:0}
.cal-table thead{position:sticky;top:0;z-index:20}

/* HEADER — alternating month colors */
.month-th{color:#fff;text-align:center;font-size:11px;font-weight:700;padding:6px 4px;letter-spacing:.5px;
  text-shadow:0 1px 3px rgba(0,0,0,.3);}
.month-th.m-odd{background:linear-gradient(180deg,#7b74f5 0%,#5a52d0 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,.2),inset 0 -2px 0 rgba(0,0,0,.15)}
.month-th.m-even{background:linear-gradient(180deg,#6560e0 0%,#4840c0 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,.15),inset 0 -2px 0 rgba(0,0,0,.15)}
.label-th-top{width:var(--label-w,160px);min-width:var(--label-w,160px);background:#fff !important;border-right:1px solid var(--border);vertical-align:middle;position:sticky;left:0;z-index:10}
.week-th{text-align:center;font-size:10px;color:#888;padding:4px 2px;font-weight:500;min-width:66px;white-space:nowrap}
.week-th.m-odd-bg{background:#eeedf8}
.week-th.m-even-bg{background:#e6e4f4}
.week-th.today{background:#f0eeff;color:var(--purple);font-weight:700}
.label-th-week{width:var(--label-w,160px);min-width:var(--label-w,160px);background:#fff !important;border-right:1px solid var(--border);position:sticky;left:0;z-index:10}

/* SECTION ROWS */
.section-td{color:#fff;font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;height:28px;vertical-align:middle;padding:0 12px;
  box-shadow:inset 0 -2px 0 rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.12);
  text-shadow:0 1px 2px rgba(0,0,0,.25)}
.section-label-td{color:#fff;font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;height:28px;vertical-align:middle;padding:0 12px;
  box-shadow:inset 0 -2px 0 rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.12);
  text-shadow:0 1px 2px rgba(0,0,0,.25)}
.section-td .sec-inner{display:flex;align-items:center;gap:7px;height:100%}

/* DATA ROWS — compact */
.data-row td{border-bottom:1px solid var(--border);height:32px;vertical-align:middle}
.data-row:nth-child(odd) td{background:var(--row-odd)}
.data-row:nth-child(odd) .data-row:nth-child(even) td{background:var(--row-even)}
.data-row:nth-child(even) .data-row.archived-row td{background:#f5f5f5 !important;opacity:.5}

.row-label-td{padding:0 8px;white-space:nowrap;position:sticky;left:0;z-index:5;background:var(--row-odd);border-right:1px solid var(--border);vertical-align:middle;width:var(--label-w,160px);min-width:var(--label-w,160px);max-width:var(--label-w,160px)}
.data-row:nth-child(even) > .row-label-td{background:var(--row-even) !important}
.data-row:nth-child(odd) > .row-label-td{background:var(--row-odd) !important}
.data-row:nth-child(even) 
.data-row:nth-child(odd) 
.col-resizer{position:absolute;right:-4px;top:0;bottom:0;width:8px;cursor:col-resize;z-index:20;display:flex;align-items:center;justify-content:center;touch-action:none}
.col-resizer::after{content:'⋮';color:var(--purple);font-size:14px;opacity:0;transition:opacity .2s;line-height:1}
.row-label-td:hover .col-resizer::after{opacity:0.4}
.col-resizer:hover::after{opacity:1 !important}
.row-label-inner{display:flex;align-items:center;gap:5px;height:100%}
.row-drag-handle{cursor:grab;color:#ccc;opacity:0;font-size:13px;line-height:1;flex-shrink:0;user-select:none;transition:opacity .15s;padding:0 2px}
.data-row:hover .row-drag-handle{opacity:1}
.row-drag-handle:active{cursor:grabbing}
.row-label-text{font-size:12px;font-weight:500;color:#333;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.del-row-btn{opacity:0;background:none;border:none;cursor:pointer;color:#ccc;padding:1px 3px;font-size:11px;line-height:1;transition:all .15s;flex-shrink:0;white-space:nowrap}
.data-row:hover .del-row-btn{opacity:1}
.del-row-btn:hover{color:#e74c3c}
.row-actions{display:inline-flex;gap:1px;opacity:0;transition:opacity .15s;flex-shrink:0}
.data-row:hover .row-actions{opacity:1}
.row-dragging td{opacity:.3}
.row-drop-above td{box-shadow:inset 0 3px 0 0 var(--purple)}
.row-drop-below td{box-shadow:inset 0 -3px 0 0 var(--purple)}

/* WEEK CELLS */
.week-cell{padding:2px 2px;position:relative;text-align:center;vertical-align:middle;overflow:visible}
.week-cell.today-col{background:rgba(108,99,232,.05)}
.week-cell.drag-over{background:rgba(108,99,232,.15) !important;outline:2px dashed var(--purple);outline-offset:-2px;border-radius:3px}
.today-line{position:absolute;top:0;bottom:0;left:50%;width:2px;background:var(--coral);z-index:3;pointer-events:none}

/* BLOCKS */
.block{display:inline-flex;align-items:center;gap:3px;border-radius:5px;font-size:10px;font-weight:700;padding:2px 7px;cursor:grab;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border:none;transition:transform .1s,box-shadow .1s;user-select:none;vertical-align:middle}
.block:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.14)}
.block:active{cursor:grabbing;transform:scale(.95)}
.block.dragging{opacity:.25}
.block.bc-event{background:var(--yellow);color:var(--yellow-text)}
.block.bc-post{background:var(--green);color:var(--green-text)}
.block.bc-video{background:var(--violet);color:var(--violet-text)}
.block.bc-other{background:var(--blue);color:var(--blue-text)}
.block.st-tbc{outline:2px dashed currentColor;outline-offset:-2px;opacity:.8}
.block.st-completed{opacity:.5;text-decoration:line-through}
.block.st-cancelled{opacity:.35;text-decoration:line-through}
.status-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.dot-upcoming{background:#22c55e}.dot-tbc{background:#f59e0b}
.dot-live{background:#ec4899}.dot-completed{background:#818cf8}.dot-cancelled{background:#ef4444}

.add-cell-btn{display:none;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;border:1.5px dashed #ccc;color:#ccc;font-size:14px;cursor:pointer;background:none;margin:0 auto;line-height:1;transition:all .15s}
.week-cell:hover .add-cell-btn{display:inline-flex}
.add-cell-btn:hover{border-color:var(--purple);color:var(--purple)}

/* SECTION ADD ROW */
.section-add-row td{border-bottom:1px solid var(--border);height:26px;background:#fafaf8}
.section-add-row-btn{display:flex;align-items:center;gap:6px;font-size:11px;color:#bbb;cursor:pointer;padding:0 14px;height:100%;border:none;background:none;font-family:inherit;white-space:nowrap;transition:color .15s}
.section-add-row-btn:hover{color:var(--purple)}
.section-add-row-btn .plus-circle{width:16px;height:16px;border-radius:50%;border:1.5px dashed #ccc;display:inline-flex;align-items:center;justify-content:center;font-size:13px;line-height:1;flex-shrink:0;transition:all .15s}
.section-add-row-btn:hover .plus-circle{border-color:var(--purple);color:var(--purple)}

/* SECTION ACTION BUTTONS */
.sec-actions{display:inline-flex;align-items:center;gap:4px;margin-left:8px;opacity:0;transition:opacity .2s}
.section-row:hover .sec-actions{opacity:1}
.sec-btn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);color:#fff;border-radius:4px;font-size:9px;font-weight:600;padding:2px 6px;cursor:pointer;font-family:inherit;transition:all .15s;line-height:1.4}
.sec-btn:hover{background:rgba(255,255,255,.35)}
.sec-drag{cursor:grab;font-size:13px;margin-right:2px;user-select:none;flex-shrink:0}
.sec-drop-above td{box-shadow:inset 0 3px 0 0 #fff}
.sec-drop-below td{box-shadow:inset 0 -3px 0 0 #fff}

/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.15);width:420px;max-width:95vw}
.modal h3{font-size:14px;font-weight:600;margin-bottom:16px;color:#111}
.form-group{margin-bottom:12px}
.form-label{font-size:10px;font-weight:600;color:#999;margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.4px}
.form-input,.form-select,.form-textarea{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:7px;font-size:12px;font-family:inherit;background:#fff;color:#111;transition:border-color .15s;outline:none}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--purple)}
.form-textarea{resize:vertical;min-height:60px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-footer{display:flex;gap:7px;margin-top:16px;justify-content:flex-end;align-items:center}
.view-field{margin-bottom:9px;font-size:12px}
.view-field strong{color:#999;font-size:10px;text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:2px}
.section-list-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border:1px solid var(--border);border-radius:7px;margin-bottom:5px;font-size:12px}
</style>
</head>
<body>
<!-- PASSWORD GATE -->
<div id="gate" style="position:fixed;inset:0;background:linear-gradient(135deg,#1a1a3e 0%,#2d2a6e 40%,#1e3a5f 100%);
  display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:0">
  <div style="background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:16px;
    padding:36px 40px;width:320px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)">
    <img id="gate-logo" src="" alt="chargEV" style="height:36px;width:auto;margin:0 auto 6px;display:block">
    <div style="font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.4);text-transform:uppercase;margin-bottom:24px">Marketing Calendar</div>
    <input type="password" id="gate-pw" placeholder="Enter password"
      style="width:100%;padding:10px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.2);
      background:rgba(255,255,255,.1);color:#fff;font-size:13px;font-family:inherit;outline:none;
      text-align:center;letter-spacing:2px;margin-bottom:10px"
      onkeydown="if(event.key==='Enter')checkGate()">
    <p id="gate-err" style="color:#fb7185;font-size:11px;margin-bottom:10px;display:none">Incorrect password</p>
    <button onclick="checkGate()"
      style="width:100%;padding:10px;border-radius:8px;background:linear-gradient(135deg,#6C63E8,#4e46ba);
      color:#fff;font-size:13px;font-weight:600;border:none;cursor:pointer;font-family:inherit;
      box-shadow:0 4px 14px rgba(108,99,232,.4)">Enter</button>
  </div>
</div>
<script>
  const GATE_PW = 'chargevmarcal';
  // Auto-unlock if already authenticated this session
  if (sessionStorage.getItem('marcal_auth') === '1') {
    document.getElementById('gate').style.display = 'none';
  }
  setTimeout(() => document.getElementById('gate-pw').focus(), 100);
  function checkGate() {
    if (document.getElementById('gate-pw').value === GATE_PW) {
      sessionStorage.setItem('marcal_auth', '1');
      document.getElementById('gate').style.display = 'none';
    } else {
      document.getElementById('gate-err').style.display = '';
      document.getElementById('gate-pw').value = '';
      document.getElementById('gate-pw').focus();
    }
  }
</script>

<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <span class="updated-tag" id="updated-tag">—</span>
      <div class="legend">
        <span class="leg leg-event">● Event</span>
        <span class="leg leg-post">● Post</span>
        <span class="leg leg-video">● Video</span>
      </div>
    </div>
    <div class="topbar-right">
      <div class="save-indicator"><div class="save-dot" id="sdot"></div><span id="slabel">All saved</span></div>
      <button class="btn btn-archive" id="archive-btn" onclick="toggleArchive()">📦 Archived</button>
      <span class="mode-badge badge-ro" id="mode-badge">Read-only</span>
      <button class="btn btn-primary" id="add-section-btn" style="display:none" onclick="openSectionModal()">＋ Section</button>
      <button class="btn btn-primary" id="add-row-btn" style="display:none" onclick="openAddRowModal(null)">＋ Row</button>
      <div style="display:flex;align-items:center;gap:3px;background:rgba(255,255,255,.1);border-radius:7px;padding:2px 6px;border:1px solid rgba(255,255,255,.15)">
        <button class="btn" style="padding:1px 7px;font-size:15px;line-height:1;border:none;background:none;color:rgba(255,255,255,.7)" onclick="zoomCal(-1)" title="Zoom out">−</button>
        <span id="zoom-label" style="font-size:10px;color:rgba(255,255,255,.6);min-width:30px;text-align:center">100%</span>
        <button class="btn" style="padding:1px 7px;font-size:15px;line-height:1;border:none;background:none;color:rgba(255,255,255,.7)" onclick="zoomCal(1)" title="Zoom in">+</button>
      </div>
      <button class="btn" onclick="scrollToToday()" title="Jump to today">📍 Today</button>
      <button class="btn" id="mode-btn" onclick="handleModeToggle()">🔐 Admin</button>
    </div>
  </div>
  <div class="cal-wrap">
    <table class="cal-table" id="cal-table">
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

<!-- BLOCK MODAL -->
<div class="modal-overlay" id="block-modal">
  <div class="modal">
    <h3 id="bm-title">Add item</h3>
    <div class="form-group"><label class="form-label">Title / Label</label><input class="form-input" id="bm-name" placeholder="e.g. Go-Live, Teaser Reel…"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Category</label>
        <select class="form-select" id="bm-cat">
          <option value="event">Event</option><option value="post">Post</option><option value="video">Video</option><option value="other">Other</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Status</label>
        <select class="form-select" id="bm-status">
          <option value="upcoming">Upcoming</option><option value="tbc">TBC</option><option value="live">Live</option><option value="completed">Completed</option><option value="cancelled">Cancelled</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Start date</label><input type="date" class="form-input" id="bm-start"></div>
      <div class="form-group"><label class="form-label">End date (opt.)</label><input type="date" class="form-input" id="bm-end"></div>
    </div>
    <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="bm-notes" placeholder="Extra context, links…"></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="bm-delete" style="display:none;margin-right:auto" onclick="deleteBlock()">🗑 Delete</button>
      <button class="btn" onclick="closeModal('block-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveBlock()">✓ Save</button>
    </div>
  </div>
</div>

<!-- VIEW MODAL -->
<div class="modal-overlay" id="view-modal">
  <div class="modal">
    <h3 id="vm-title">Item details</h3>
    <div id="vm-body"></div>
    <div class="modal-footer"><button class="btn btn-primary" onclick="closeModal('view-modal')">Close</button></div>
  </div>
</div>

<!-- ADD ROW MODAL -->
<div class="modal-overlay" id="row-modal">
  <div class="modal" style="width:340px">
    <h3>Add row</h3>
    <div class="form-group"><label class="form-label">Row name</label><input class="form-input" id="rm-name" placeholder="e.g. Teaser, Brand X…"></div>
    <div class="form-group"><label class="form-label">Section</label><select class="form-select" id="rm-section"></select></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('row-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveRow()">✓ Add row</button>
    </div>
  </div>
</div>

<!-- SECTION MODAL -->
<div class="modal-overlay" id="section-modal">
  <div class="modal" style="width:340px">
    <h3>Manage sections</h3>
    <div id="section-list"></div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <input class="form-input" id="sm-name" placeholder="New section name…" style="flex:1" onkeydown="if(event.key==='Enter')addSection()">
      <button class="btn btn-primary" onclick="addSection()">+ Add</button>
    </div>
    <div class="modal-footer"><button class="btn btn-primary" onclick="closeModal('section-modal')">Done</button></div>
  </div>
</div>

<!-- AUTH MODAL -->
<div class="modal-overlay" id="auth-modal">
  <div class="modal" style="width:300px;text-align:center">
    <h3>Admin access</h3>
    <p style="font-size:12px;color:#888;margin-bottom:12px">Enter password to enable editing</p>
    <input type="password" class="form-input" id="auth-pw" placeholder="Password" onkeydown="if(event.key==='Enter')checkAuth()">
    <p id="auth-err" style="color:#e53;font-size:11px;margin-top:5px;display:none">Incorrect password</p>
    <div class="modal-footer" style="justify-content:center">
      <button class="btn" onclick="closeModal('auth-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="checkAuth()">Enter</button>
    </div>
  </div>
</div>

<script>

// ── WEEKS ──────────────────────────────────────────────
function getWeeks() {
  const ws = [], s = new Date(2026,4,11), e = new Date(2028,11,31);
  for (let d = new Date(s); d <= e; d.setDate(d.getDate()+7)) {
    const mon = new Date(d), sun = new Date(d);
    sun.setDate(sun.getDate()+6);
    ws.push({ mon:new Date(mon), sun:new Date(sun),
      label:(mon.getMonth()+1)+"/"+mon.getDate(), month:mon.getMonth() });
  }
  return ws;
}
const WEEKS = getWeeks();
const TODAY = new Date();
const TODAY_WI = WEEKS.findIndex(w => TODAY >= w.mon && TODAY <= w.sun);

function dateInWeek(ds, w) {
  if (!ds) return false;
  const d = new Date(ds+"T00:00:00");
  return d >= w.mon && d <= w.sun;
}

// ── GOOGLE SHEETS CONFIG ───────────────────────────────
// Paste your Apps Script Web App URL here after deploying:
const GAS_URL = 'https://script.google.com/macros/s/AKfycbw2Ei2W12izAGCIIO534JLB5VmcQGJ678WuZcJfljUX5PtQ0kcxGenB_A_5gYflrxfXnQ/exec';  // e.g. 'https://script.google.com/macros/s/ABC.../exec'

async function load() {
  // Show loading state
  document.getElementById('slabel').textContent = 'Loading…';
  document.getElementById('sdot').className = 'save-dot saving';

  if (!GAS_URL) {
    // Try localStorage first
    try {
      const stored = localStorage.getItem('marcal_local');
      if (stored) {
        data = JSON.parse(stored);
      } else {
        // Try recovering from Claude's old backend (window.storage)
        try {
          const oldKeys = ['marcal_v3','marcal_v2','marcal_v1'];
          for (const key of oldKeys) {
            const r = await window.storage.get(key);
            if (r && r.value) {
              data = JSON.parse(r.value);
              // Migrate to localStorage immediately
              localStorage.setItem('marcal_local', r.value);
              console.log('Recovered data from Claude backend key:', key);
              break;
            }
          }
        } catch(e) { /* window.storage not available outside Claude */ }
        if (!data) data = defaultData();
      }
    } catch(e) { data = defaultData(); }
    data.rows.forEach(r => { if (r.archived===undefined) r.archived=false; });
    data.sections.forEach(s => { if (s.archived===undefined) s.archived=false; });
    document.getElementById('sdot').className = 'save-dot';
    document.getElementById('slabel').textContent = 'Local only';
    render(); updateTag();
    setTimeout(scrollToToday, 300);
    return;
  }

  try {
    const res = await fetch(GAS_URL + '?action=load', { method: 'GET' });
    const json = await res.json();
    if (json.ok && json.data) {
      data = json.data;
      // Save a fresh cache to localStorage every successful load
      try { localStorage.setItem('marcal_local', JSON.stringify(data)); } catch(e){}
    } else {
      throw new Error('Bad response from Sheets');
    }
  } catch(e) {
    console.warn('Could not reach Google Sheets, trying local cache...', e);
    // NEVER fall back to defaultData — use localStorage cache instead
    try {
      const cached = localStorage.getItem('marcal_local');
      if (cached) {
        data = JSON.parse(cached);
        document.getElementById('slabel').textContent = 'Offline (cached)';
      } else {
        // Truly no data anywhere — only then use defaults
        data = defaultData();
        document.getElementById('slabel').textContent = 'No data found';
      }
    } catch(e2) { data = defaultData(); }
  }
  data.rows.forEach(r => { if (r.archived===undefined) r.archived=false; });
  data.sections.forEach(s => { if (s.archived===undefined) s.archived=false; });
  document.getElementById('sdot').className = 'save-dot saved';
  document.getElementById('slabel').textContent = document.getElementById('slabel').textContent === 'Offline (cached)' ? 'Offline (cached)' : 'All saved';
  render(); updateTag();
  setTimeout(scrollToToday, 300);
}

// Debounce saves so rapid changes don't spam the API
let saveTimer = null;
async function save() {
  data.updatedAt = new Date().toISOString();
  setSaving(true);

  // Always save to localStorage as instant backup
  try { localStorage.setItem('marcal_local', JSON.stringify(data)); } catch(e){}

  if (!GAS_URL) {
    setSaving(false); updateTag(); return;
  }

  // Debounce: wait 800ms of inactivity before writing to Sheet
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'save', data }),
        headers: { 'Content-Type': 'text/plain' } // avoids CORS preflight
      });
    } catch(e) { console.warn('Save to Sheets failed', e); }
    setSaving(false); updateTag();
  }, 800);
}

function setSaving(s) {
  const dot=document.getElementById('sdot'), lbl=document.getElementById('slabel');
  if(s){dot.className='save-dot saving';lbl.textContent='Saving…';}
  else{dot.className='save-dot saved';lbl.textContent='All saved';setTimeout(()=>dot.className='save-dot',2000);}
}
function updateTag() {

// ── RENDER ─────────────────────────────────────────────
function render(){ renderHead(); renderBody(); }

function renderHead() {
  // Count weeks per month
  const monthOrder=[], seen={};
  WEEKS.forEach((w,i)=>{
    const key = w.month + '-' + w.mon.getFullYear();
    if(!seen[key]){
      seen[key]={label:MONTHS[w.month],year:w.mon.getFullYear(),count:0,idx:monthOrder.length};
      monthOrder.push(seen[key]);
    }
    seen[key].count++;
  });

  // Row 1: label cell (rowspan=2) + month headers
  const labelStyle = 'padding:4px 8px;vertical-align:middle;text-align:center;background:#fff;border-right:1px solid var(--border);position:sticky;left:0;z-index:10;width:var(--label-w,160px);min-width:var(--label-w,160px);max-width:var(--label-w,160px)';
  let mRow = '<tr>'
    + `<th class="label-th-top" rowspan="2" style="${labelStyle}">`
    + `<img src="${LOGO_SRC}" alt="chargEV" style="height:24px;width:auto;display:block;margin:0 auto;object-fit:contain">`
    + `</th>`;
  monthOrder.forEach((m,mi)=>{
    mRow += `<th class="month-th ${mi%2===0?'m-odd':'m-even'}" colspan="${m.count}">${m.label.toUpperCase()} ${m.year}</th>`;
  });
  mRow += '</tr>';

  // Map each week to its month index for alternating colours
  const weekMonthIdx = WEEKS.map(w => {
    const key = w.month + '-' + w.mon.getFullYear();
    return seen[key] ? seen[key].idx : 0;
  });

  // Row 2: NO label cell — covered by rowspan=2 above
  let wRow = '<tr>';
  WEEKS.forEach((w,i)=>{
    const mi = weekMonthIdx[i];
    const cls = i===TODAY_WI ? 'week-th today' : `week-th ${mi%2===0?'m-odd-bg':'m-even-bg'}`;
    wRow += `<th class="${cls}">${w.label}</th>`;
  });
  wRow += '</tr>';

  document.getElementById('thead').innerHTML = mRow + wRow;
}

// Section colors cycle
const SEC_COLORS=['#4a47c4','#3d3aab','#5651d4','#342fa0'];

function renderBody() {
  let html='';
  const visibleSections = data.sections.filter(s => showArchived ? true : !s.archived);

  visibleSections.forEach((sec,si)=>{
    const baseColor=SEC_COLORS[si%SEC_COLORS.length];
    const bg=`linear-gradient(135deg,${baseColor} 0%,${SEC_COLORS[(si+2)%SEC_COLORS.length]} 100%)`;
    const isArchived=sec.archived;
    const archiveLabel=isArchived?'Unarchive':'Archive';
    const secDragHandle = isAdmin
      ? `<span class="sec-drag" draggable="true"
           ondragstart="secDragStart(event,'${sec.id}')"
           ondragend="secDragEnd(event)"
           title="Drag to reorder">⠿</span>`
      : '';
    const secActions=isAdmin
      ?`<span class="sec-actions">
          <button class="sec-btn" onclick="openAddRowModal('${sec.id}')">+ Row</button>
          <button class="sec-btn" onclick="renameSec('${sec.id}','${sec.label.replace(/'/g,"\\'").replace(/"/g,"&quot;")}')">✏ Rename</button>
          <button class="sec-btn" onclick="archiveSec('${sec.id}')">${archiveLabel}</button>
          <button class="sec-btn" onclick="delSec('${sec.id}')">✕</button>
        </span>`
      :'';
    html+=`<tr class="section-row" data-sid="${sec.id}"
      ondragover="secDragOver(event,this)" ondragleave="secDragLeave(this)" ondrop="secDropOn(event,this)">
      <td class="section-label-td" style="background:${bg};position:sticky;left:0;z-index:6;width:var(--label-w,160px);min-width:var(--label-w,160px);max-width:var(--label-w,160px);border-right:1px solid rgba(255,255,255,.2)">
        <div class="sec-inner">${secDragHandle}${isArchived?'📦 ':''}<span>${sec.label}</span></div>
      </td>
      <td class="section-td" colspan="${WEEKS.length}" style="background:${bg}">
        <div style="display:flex;justify-content:flex-end">${secActions}</div>
      </td></tr>`;

    const secRows=data.rows.filter(r=>r.sid===sec.id && (showArchived?true:!r.archived));
    secRows.forEach(row=>{ html+=renderRow(row); });

    if(isAdmin){
      html+=`<tr class="section-add-row">
        <td style="position:sticky;left:0;z-index:5;background:#fafaf8;border-right:1px solid var(--border)">
          <button class="section-add-row-btn" onclick="openAddRowModal('${sec.id}')">
            <span class="plus-circle">+</span> Add row
          </button>
        </td>
        <td colspan="${WEEKS.length}"></td></tr>`;
    }
  });

  if(isAdmin){
    html+=`<tr class="section-add-row" style="background:#f0eeff">
      <td style="position:sticky;left:0;z-index:5;background:#f0eeff;border-right:1px solid var(--border)">
        <button class="section-add-row-btn" onclick="openSectionModal()">
          <span class="plus-circle" style="border-color:#a78bfa;color:#7c3aed">+</span>
          <span style="color:#7c3aed">Add section</span>
        </button>
      </td>
      <td colspan="${WEEKS.length}"></td></tr>`;
  }

  document.getElementById('tbody').innerHTML=html;

  // attach delegated drop listeners freshly
  setupDropListeners();
}

function renderRow(row) {
  const isArc=row.archived;
  let cells=WEEKS.map((w,wi)=>{
    const blocks=data.blocks.filter(b=>b.rid===row.id && dateInWeek(b.start,w));
    const todayCls=wi===TODAY_WI?' today-col':'';
    const todayLine=wi===TODAY_WI?'<div class="today-line"></div>':'';
    const bHtml=blocks.map(b=>blockHtml(b)).join(' ');
    const addBtn=isAdmin&&!isArc?`<button class="add-cell-btn" onclick="openAddBlock('${row.id}',${wi})" title="Add item">+</button>`:'';
    return `<td class="week-cell${todayCls}" data-rid="${row.id}" data-wi="${wi}">${todayLine}${bHtml}${addBtn}</td>`;
  }).join('');

  const dragHandle=isAdmin&&!isArc?`<span class="row-drag-handle" draggable="true"
    ondragstart="rowDragStart(event,'${row.id}')"
    ondragend="rowDragEnd(event)" title="Reorder">⠿</span>`:'';

  const labelEl=isAdmin
    ?`<span class="row-label-text" style="cursor:text" onclick="editRowLabel('${row.id}',this)">${row.label}</span>`
    :`<span class="row-label-text">${row.label}</span>`;

  let adminBtns='';
  if(isAdmin){
    const arcLabel=isArc?'↩':'📦';
    const arcTitle=isArc?'Unarchive row':'Archive row';
    adminBtns=`<span class="row-actions">
      <button class="del-row-btn" onclick="archiveRow('${row.id}')" title="${arcTitle}">${arcLabel}</button
      ><button class="del-row-btn" onclick="deleteRow('${row.id}')" title="Delete row">✕</button>
    </span>`;
  }

  return `<tr class="data-row${isArc?' archived-row':''}" data-rid="${row.id}"
    ondragover="rowDragOver(event,this)"
    ondragleave="rowDragLeave(this)"
    ondrop="rowDrop(event,this)">
    <td class="row-label-td">
      <div class="row-label-inner">${dragHandle}${labelEl}${adminBtns}</div>
      <div class="col-resizer" onmousedown="startColResize(event)"></div>
    </td>${cells}</tr>`;
}

function blockHtml(b) {
  // Dragging always enabled so both admin and read-only can rearrange
  const drag = 'draggable="true"';
  const ds = `ondragstart="blockDragStart(event,'${b.id}')"`;
  const de = `ondragend="blockDragEnd(event)"`;
  const click = isAdmin ? `onclick="openEditBlock('${b.id}')"` : `onclick="openViewBlock('${b.id}')"`;
  const stCls = ['tbc','completed','cancelled'].includes(b.status) ? ' st-'+b.status : '';
  return `<span class="block bc-${b.cat}${stCls}" data-bid="${b.id}" ${drag} ${ds} ${de} ${click}>
    <span class="status-dot dot-${b.status}"></span>${b.title}</span>`;
}

// ── BLOCK DRAG ─────────────────────────────────────────
function blockDragStart(e,bid) {
  draggingBlock=bid; draggingRow=null;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/bid', bid);
  e.dataTransfer.setData('text/plain', bid);
  // DO NOT stopPropagation — tbody listener needs to see this
  setTimeout(()=>{
    const el=document.querySelector('[data-bid="'+bid+'"]');
    if(el) el.classList.add('dragging');
  },0);
}
function blockDragEnd(e) {
  draggingBlock=null;
  document.querySelectorAll('.dragging').forEach(el=>el.classList.remove('dragging'));
  document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
}
function handleBlockDrop(e, cell) {
  e.preventDefault();
  document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
  const bid = draggingBlock || e.dataTransfer.getData('text/plain');
  if(!bid) return;
  const newRid = cell.dataset.rid;
  const wi = parseInt(cell.dataset.wi);
  if(!newRid || isNaN(wi)) return;
  const blk = data.blocks.find(b=>b.id===bid);
  if(!blk) return;
  // Preserve the day-of-week: find the same weekday in the target week
  const origDate = blk.start ? new Date(blk.start+'T00:00:00') : null;
  const targetMon = WEEKS[wi].mon;
  if(origDate) {
    // day 0=Sun…6=Sat; Mon of week = day 1
    let dow = origDate.getDay(); // 0=Sun,1=Mon…
    let offset = dow === 0 ? 6 : dow - 1; // offset from Monday
    const newDate = new Date(targetMon);
    newDate.setDate(newDate.getDate() + offset);
    blk.start = newDate.toISOString().split('T')[0];
  } else {
    blk.start = targetMon.toISOString().split('T')[0];
  }
  blk.rid = newRid;
  draggingBlock = null;
  save(); render();
}

// ── ROW DRAG ───────────────────────────────────────────
function rowDragStart(e,rid) {
  draggingRow=rid; draggingBlock=null;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain','row:'+rid);
  // don't stopPropagation so cell listeners don't interfere
  setTimeout(()=>{
    const tr=document.querySelector(`tr[data-rid="${rid}"]`);
    if(tr)tr.classList.add('row-dragging');
  },0);
}
function rowDragEnd(e) {
  document.querySelectorAll('.row-dragging').forEach(el=>el.classList.remove('row-dragging'));
  document.querySelectorAll('.row-drop-above,.row-drop-below').forEach(el=>{
    el.classList.remove('row-drop-above');el.classList.remove('row-drop-below');
  });
  draggingRow=null;
}
function rowDragOver(e,tr) {
  if(!draggingRow) return;
  e.preventDefault();
  document.querySelectorAll('.row-drop-above,.row-drop-below').forEach(el=>{
    el.classList.remove('row-drop-above');el.classList.remove('row-drop-below');
  });
  const rect=tr.getBoundingClientRect();
  tr.classList.add(e.clientY<rect.top+rect.height/2?'row-drop-above':'row-drop-below');
}
function rowDragLeave(tr) {
  tr.classList.remove('row-drop-above');tr.classList.remove('row-drop-below');
}
function rowDrop(e,tr) {
  e.preventDefault();
  tr.classList.remove('row-drop-above');tr.classList.remove('row-drop-below');
  if(!draggingRow) return;
  const targetRid=tr.dataset.rid;
  if(!targetRid||draggingRow===targetRid) return;
  const rect=tr.getBoundingClientRect();
  const before=e.clientY<rect.top+rect.height/2;
  const fromIdx=data.rows.findIndex(r=>r.id===draggingRow);
  let toIdx=data.rows.findIndex(r=>r.id===targetRid);
  if(fromIdx===-1||toIdx===-1) return;
  const [moved]=data.rows.splice(fromIdx,1);
  toIdx=data.rows.findIndex(r=>r.id===targetRid);
  // inherit section of target row
  const targetRow=data.rows[toIdx];
  if(targetRow) moved.sid=targetRow.sid;
  data.rows.splice(before?toIdx:toIdx+1,0,moved);
  save(); render();
}

// Called once after DOM ready — uses the stable cal-wrap container
function setupDropListeners() {
  // intentionally empty — listeners attached once in initListeners()
}
// ── SECTION DRAG ───────────────────────────────────────
let draggingSec = null;
function secDragStart(e, sid) {
  draggingSec = sid;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', 'sec:' + sid);

    document.querySelectorAll('.section-row').forEach(tr => {
      if (tr.dataset.sid === sid) tr.style.opacity = '0.4';

}
function secDragEnd(e) {
  draggingSec = null;
  document.querySelectorAll('.section-row').forEach(tr => tr.style.opacity = '');
  document.querySelectorAll('.sec-drop-above,.sec-drop-below').forEach(tr => {
    tr.classList.remove('sec-drop-above','sec-drop-below');
  });
}

function secDragOver(e, tr) {
  if (!draggingSec) return;
  e.preventDefault(); e.stopPropagation();
  document.querySelectorAll('.sec-drop-above,.sec-drop-below').forEach(t => {
    t.classList.remove('sec-drop-above','sec-drop-below');
  });
  const rect = tr.getBoundingClientRect();
  tr.classList.add(e.clientY < rect.top + rect.height / 2 ? 'sec-drop-above' : 'sec-drop-below');
}
function secDragLeave(tr) {
  tr.classList.remove('sec-drop-above','sec-drop-below');
}
function secDropOn(e, tr) {
  e.preventDefault(); e.stopPropagation();
  tr.classList.remove('sec-drop-above','sec-drop-below');
  if (!draggingSec) return;
  const targetSid = tr.dataset.sid;
  if (!targetSid || draggingSec === targetSid) return;
  const rect = tr.getBoundingClientRect();
  const before = e.clientY < rect.top + rect.height / 2;
  const fromIdx = data.sections.findIndex(s => s.id === draggingSec);
  let toIdx = data.sections.findIndex(s => s.id === targetSid);
  if (fromIdx === -1 || toIdx === -1) return;
  const [moved] = data.sections.splice(fromIdx, 1);
  toIdx = data.sections.findIndex(s => s.id === targetSid);
  data.sections.splice(before ? toIdx : toIdx + 1, 0, moved);
  save(); render();
}

// ── COL RESIZE ──────────────────────────────────────────
let labelW = 160;
function startColResize(e) {
  e.preventDefault();
  const startX = e.clientX;
  const startW = labelW;
  function onMove(e) {
    labelW = Math.max(80, Math.min(300, startW + e.clientX - startX));
    document.documentElement.style.setProperty('--label-w', labelW + 'px');
  }
  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function scrollToToday() {
  if (TODAY_WI < 0) return;
  // Find the today-col cell and scroll it into view
  const todayCell = document.querySelector('.today-col');
  if (todayCell) {
    todayCell.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }
}

function initListeners() {
  const wrap = document.getElementById('cal-table');
  wrap.addEventListener('dragover', e => {
    if (draggingBlock) {
      const cell = e.target.closest('.week-cell');
      if (cell) {
        e.preventDefault();
        document.querySelectorAll('.drag-over').forEach(x => x.classList.remove('drag-over'));
        cell.classList.add('drag-over');
      }
    }
  });
  wrap.addEventListener('dragleave', e => {
    const cell = e.target.closest('.week-cell');
    if (cell && !cell.contains(e.relatedTarget)) {
      cell.classList.remove('drag-over');
    }
  });
  wrap.addEventListener('drop', e => {
    if (draggingBlock) {
      const cell = e.target.closest('.week-cell');
      if (cell) handleBlockDrop(e, cell);
    }
  });
}

// ── INLINE EDIT ────────────────────────────────────────
function editRowLabel(rid,el) {
  if(el.querySelector('input')) return;
  const old=el.textContent;
  el.innerHTML='';
  const inp=document.createElement('input');
  inp.value=old;
  inp.style.cssText='border:none;outline:1px solid var(--purple);border-radius:4px;padding:2px 5px;font-size:12px;font-weight:500;width:110px;font-family:inherit;background:#fff';
  el.appendChild(inp); inp.focus(); inp.select();
  function commit(){
    const v=inp.value.trim()||old;
    const row=data.rows.find(r=>r.id===rid);
    if(row) row.label=v;
    save(); render();
  }
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=old;inp.blur();}});
}

// ── BLOCK MODAL ────────────────────────────────────────
function openAddBlock(rid,wi) {
  _editBid=null;_addRid=rid;_addWi=wi;
  document.getElementById('bm-title').textContent='Add item';
  document.getElementById('bm-name').value='';
  document.getElementById('bm-cat').value='event';
  document.getElementById('bm-status').value='upcoming';
  document.getElementById('bm-start').value=WEEKS[wi].mon.toISOString().split('T')[0];
  document.getElementById('bm-end').value='';
  document.getElementById('bm-notes').value='';
  document.getElementById('bm-delete').style.display='none';
  openModal('block-modal');
  setTimeout(()=>document.getElementById('bm-name').focus(),60);
}
function openEditBlock(bid) {
  const b=data.blocks.find(x=>x.id===bid); if(!b) return;
  _editBid=bid;_addRid=null;_addWi=null;
  document.getElementById('bm-title').textContent='Edit item';
  document.getElementById('bm-name').value=b.title;
  document.getElementById('bm-cat').value=b.cat;
  document.getElementById('bm-status').value=b.status;
  document.getElementById('bm-start').value=b.start;
  document.getElementById('bm-end').value=b.end||'';
  document.getElementById('bm-notes').value=b.notes||'';
  document.getElementById('bm-delete').style.display='';
  openModal('block-modal');
}
function openViewBlock(bid) {
  const b=data.blocks.find(x=>x.id===bid); if(!b) return;
  document.getElementById('vm-title').textContent=b.title;
  const CAT={event:'Event',post:'Post',video:'Video',other:'Other'};
  const ST={upcoming:'Upcoming',tbc:'TBC',live:'Live',completed:'Completed',cancelled:'Cancelled'};
  document.getElementById('vm-body').innerHTML=`
    <div class="view-field"><strong>Category</strong>${CAT[b.cat]||b.cat}</div>
    <div class="view-field"><strong>Status</strong>${ST[b.status]||b.status}</div>
    <div class="view-field"><strong>Date</strong>${b.start}${b.end?' → '+b.end:''}</div>
    ${b.notes?`<div class="view-field"><strong>Notes</strong>${b.notes}</div>`:''}`;
  openModal('view-modal');
}
function saveBlock() {
  const title=document.getElementById('bm-name').value.trim();
  if(!title){document.getElementById('bm-name').focus();return;}
  const obj={
    cat:document.getElementById('bm-cat').value,
    status:document.getElementById('bm-status').value,
    title,
    start:document.getElementById('bm-start').value,
    end:document.getElementById('bm-end').value,
    notes:document.getElementById('bm-notes').value.trim()
  };
  if(_editBid){
    Object.assign(data.blocks.find(b=>b.id===_editBid),obj);
  } else {
    data.blocks.push({id:'b'+Date.now(),rid:_addRid,...obj});
  }
  save(); render(); closeModal('block-modal');
}
function deleteBlock() {
  if(!_editBid) return;
  if(!confirm('Delete this item?')) return;
  data.blocks=data.blocks.filter(b=>b.id!==_editBid);
  _editBid=null;
  save(); render(); closeModal('block-modal');
}

// ── ROW MODAL ──────────────────────────────────────────
function openAddRowModal(sid) {
  document.getElementById('rm-name').value='';
  const sel=document.getElementById('rm-section');
  sel.innerHTML=data.sections.map(s=>`<option value="${s.id}"${s.id===sid?' selected':''}>${s.label}</option>`).join('');
  openModal('row-modal');
  setTimeout(()=>document.getElementById('rm-name').focus(),60);
}
function saveRow() {
  const label=document.getElementById('rm-name').value.trim();
  if(!label){document.getElementById('rm-name').focus();return;}
  data.rows.push({id:'r'+Date.now(),sid:document.getElementById('rm-section').value,label,archived:false});
  save(); render(); closeModal('row-modal');
}
function deleteRow(rid) {
  if(!confirm('Delete this row and all its items?')) return;
  data.rows=data.rows.filter(r=>r.id!==rid);
  data.blocks=data.blocks.filter(b=>b.rid!==rid);
  save(); render();
}
function archiveRow(rid) {
  const row=data.rows.find(r=>r.id===rid);
  if(row) row.archived=!row.archived;
  save(); render();
}

// ── SECTION MODAL ──────────────────────────────────────
function openSectionModal(){renderSectionList();openModal('section-modal');}
function renderSectionList(){
  document.getElementById('section-list').innerHTML=data.sections.map(s=>
    `<div class="section-list-item"><span>${s.archived?'📦 ':''} ${s.label}</span>
     <div style="display:flex;gap:5px">
       <button class="btn btn-sm" onclick="archiveSec('${s.id}')" style="font-size:10px">${s.archived?'↩ Restore':'📦 Archive'}</button>
       <button class="btn btn-sm btn-danger" onclick="delSec('${s.id}')">✕</button>
     </div></div>`
  ).join('');
}
function addSection(){
  const name=document.getElementById('sm-name').value.trim();
  if(!name) return;
  data.sections.push({id:'s'+Date.now(),label:name,archived:false});
  document.getElementById('sm-name').value='';
  save(); render(); renderSectionList();
}
function renameSec(id,old){
  const name=prompt('Rename section:',old);
  if(!name||!name.trim()) return;
  data.sections.find(s=>s.id===id).label=name.trim();
  save(); render();
}
function archiveSec(id){
  const sec=data.sections.find(s=>s.id===id);
  if(sec) sec.archived=!sec.archived;
  save(); render(); if(document.getElementById('section-modal').classList.contains('open')) renderSectionList();
}
function delSec(id){
  if(!confirm('Delete section and all its rows/items?')) return;
  const rids=data.rows.filter(r=>r.sid===id).map(r=>r.id);
  data.sections=data.sections.filter(s=>s.id!==id);
  data.rows=data.rows.filter(r=>r.sid!==id);
  data.blocks=data.blocks.filter(b=>!rids.includes(b.rid));
  save(); render();
  if(document.getElementById('section-modal').classList.contains('open')) renderSectionList();
}

let zoomLevel = 100; // percent
const ZOOM_STEPS = [40, 60, 80, 100, 140, 200, 300];
let zoomIdx = 3; // index into ZOOM_STEPS, default 100%

function zoomCal(dir) {
  zoomIdx = Math.max(0, Math.min(ZOOM_STEPS.length-1, zoomIdx + dir));
  zoomLevel = ZOOM_STEPS[zoomIdx];
  applyZoom();
}
function applyZoom() {
  let style = document.getElementById('zoom-style');
  if(!style){ style=document.createElement('style'); style.id='zoom-style'; document.head.appendChild(style); }
  const colW = Math.round(66 * zoomLevel / 100);
  // When columns are wide enough, let block text breathe
  const blockMaxW = Math.max(colW - 4, 30);
  style.textContent = `
    .week-th {
      min-width:${colW}px !important;
      width:${colW}px !important;
    }
    .week-cell {
      min-width:${colW}px !important;
      width:${colW}px !important;
      overflow: visible !important;
    }
    .block {
      max-width: none !important;
      font-size: 10px !important;
      white-space: nowrap !important;
    }
  `;
  document.getElementById('zoom-label').textContent = zoomLevel + '%';
}
